<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head th:replace="layout/head :: head">
</head>
<body>

<!-- ════════ SIDEBAR ════════ -->
<aside th:replace="layout/aside :: aside"></aside>

<!-- ════════ MAIN ════════ -->
<div class="bl-main">
    <header th:replace="layout/header :: header"></header>
    <div class="bl-content">
        <!-- ══════ PAGE: BOOKS ══════ -->
        <div class="bl-page active" id="page-books">

            <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
                <form th:action="@{/quan-ly/reserve}" style="display: contents;">
                    <div class="bl-search-bar" style="flex:1;min-width:220px;"><span
                            style="color:var(--mist);">🔍</span>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo msx phiếu ..." id="searchreserve">
                        <button type="button" onclick="startScan('searchreserve')" class="bl-btn bl-btn-primary">
                            📷
                        </button>
                    </div>
                    <select class="bl-filter-select" name="status" style="height: 55px;">
                        <option value="">Tất cả trạng thái</option>
                        <option value="1">Chờ xử lý</option>
                        <option value="2">Xác nhận</option>
                        <option value="3">Từ chối</option>
                    </select>
                    <button type="submit" class="bl-btn bl-btn-secondary" style="height: 55px;">Tìm</button>
                </form>
            </div>

            <div id="books-list-view">
                <div class="bl-panel">
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <strong>Thành công!</strong> <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <strong>Lỗi!</strong> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div class="overdue-alert" th:if="${todayAutoCancel > 0}" style="margin-bottom:20px;">
                        ❌ Hôm nay hệ thống đã tự động hủy
                        <strong th:text="${todayAutoCancel}">0</strong>
                        yêu cầu mượn do quá 2 ngày không đến nhận sách.
                    </div>
                    <table class="bl-data-table">
                        <thead>
                        <tr>
                            <th>Tên sách</th>
                            <th>Mã độc giả</th>
                            <th>Độc giả</th>
                            <th>Số ngày mượn</th>
                            <th>Xếp hạng</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(borrowRequest)}">
                            <td colspan="7" class="empty-state"><i class="ti ti-book-off"></i>
                                <p>Không có sách nào đang mượn</p></td>
                        </tr>
                        <tr th:each="b : ${borrowRequest}">
                            <td>
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <div style="width:32px;height:42px;background:#fef3dc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
                                        📗
                                    </div>
                                    <div style="font-weight:500;"
                                         th:text="${b.bookCopy.bookTitle.title != null
                                         ? b.bookCopy.bookTitle.title : 'Chưa có tên'}">
                                        Đắc Nhân Tâm
                                    </div>
                                </div>
                            </td>
                            <td th:text="${b.libraryCard.id != null ? b.libraryCard.id : 'Không rõ'}">
                                Dale Carnegie
                            </td>
                            <td>
                                <span class="font-family:'DM Mono',monospace;font-weight:600;"
                                      th:text="${b.libraryCard.reader.name != null ? b.libraryCard.reader.name : '---'}">
                                    Kỹ năng sống
                                </span>
                            </td>
                            <td style="font-family:'DM Mono',monospace;font-size:12px;"
                                th:text="${b.requestDays != null ? b.requestDays : '---'}">
                                978-604-1-22345-6
                            </td>
                            <td style="bl-badge bl-badge-silver">
                                <span th:text="${
                                    b.libraryCard.totalBorrow >= 100 ? '👑 Kim Cương' :
                                    b.libraryCard.totalBorrow >= 60 ? '💎 Bạch Kim' :
                                    b.libraryCard.totalBorrow >= 30 ? '🥇 Vàng' :
                                    b.libraryCard.totalBorrow >= 10 ? '🥈 Bạc' :
                                    '🥉 Đồng'}">
                                </span>
                            </td>

                            <td>
                            <span th:class="${b.status == 1} ? 'status-badge status-borrowed'
                                        : (${b.status == 2} ? 'status-badge status-available'
                                        : (${b.status == 4} ? 'status-badge status-available'
                                        : 'status-badge status-overdue'))"
                                  th:text="${b.status == 1} ? 'Chờ xử lý'
                                        : (${b.status == 2} ? 'Đã xác nhận'
                                        : (${b.status == 4} ? 'Đã in phiếu'
                                        : 'Từ chối'))">
                            </span>
                            </td>
                            <td>
                                <button class="action-btn" th:if="${b.status == 1}"
                                        th:data-id="${b.id}"
                                        th:data-book="${b.bookCopy.bookTitle.title}"
                                        th:data-reader="${b.libraryCard.reader.name}"
                                        onclick="acceptRequest(this)">Chấp nhận
                                </button>
                                <button class="action-btn" th:if="${b.status == 1}"
                                        th:data-id="${b.id}"
                                        th:data-book="${b.bookCopy.bookTitle.title}"
                                        th:data-reader="${b.libraryCard.reader.name}"
                                        onclick="rejectRequest(this)">Từ chối
                                </button>
                                <button class="action-btn" th:if="${b.status == 2}"
                                        th:data-id="${b.id}"
                                        th:data-book="${b.bookCopy.bookTitle.title}"
                                        th:data-reader="${b.libraryCard.reader.name}"
                                        onclick="createBorrowSlip(this)">Lập phiếu mượn
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div id="reader"></div>
    </div><!-- /content -->
</div><!-- /main -->

<!-- ════════ MODALS ════════ -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="layout/script :: script"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
    function acceptRequest(element) {
        const cId = element.dataset.id;
        const book = element.dataset.book;
        const reader = element.dataset.reader;
        if (confirm("Chấp nhận yêu cầu mượn sách " + book + " của độc giả " + reader + " ?")) {
           window.location.href = "/qltv/quan-ly/accept-request?id=" + cId;
        }
    }

    function rejectRequest(element) {
        const cId = element.dataset.id;
        const book = element.dataset.book;
        const reader = element.dataset.reader;
        if (confirm("Từ chối yêu cầu mượn sách " + book + " của độc giả " + reader + " ?")) {
            window.location.href = "/qltv/quan-ly/reject-request?id=" + cId;
        }
    }

    function createBorrowSlip(element) {
        const cId = element.dataset.id;
        const book = element.dataset.book;
        const reader = element.dataset.reader;
        if (confirm("Bạn có chắc muốn lập phiếu mượn sách " + book + " cho độc giả" + reader+ "?")) {
            window.location.href = "/qltv/quan-ly/create-borrow?id=" + cId;
        }
    }

</script>
</body>
</html>
