<script th:fragment="script">
    const pageMap = {
  dashboard: { id:'page-dashboard', title:'Bảng điều khiển', sub:'Thứ Tư, 25 tháng 3 năm 2026', nav:'nav-dashboard' },
  books:     { id:'page-books',     title:'Danh mục sách',   sub:'Quản lý kho sách · 8,247 đầu sách', nav:'nav-books' },
  borrow:    { id:'page-borrow',    title:'Quản lý lưu hành', sub:'Cho mượn · Trả sách · Quá hạn',   nav:'nav-borrow' },
  members:   { id:'page-members',   title:'Quản lý hội viên', sub:'Danh sách &amp; hồ sơ độc giả',    nav:'nav-members' },
  stats:     { id:'page-stats',     title:'Thống kê &amp; Báo cáo', sub:'Thứ Tư, 25 tháng 3 năm 2026', nav:'nav-stats' },
};

function showCircTab(tabId) {
  document.querySelectorAll('.circ-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.circ-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  const btnMap = {'borrow-tab':'tab-borrow-btn','return-tab':'tab-return-btn','overdue-tab':'tab-overdue-btn','history-tab':'tab-history-btn'};
  if (btnMap[tabId]) document.getElementById(btnMap[tabId]).classList.add('active');
}

function setView(v) {
  const grid = document.getElementById('books-grid-view');
  const list = document.getElementById('books-list-view');
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (v === 'grid') {
    grid.style.display = 'block'; list.style.display = 'none';
    document.querySelectorAll('.view-btn')[0].classList.add('active');
  } else {
    grid.style.display = 'none'; list.style.display = 'block';
    document.querySelectorAll('.view-btn')[1].classList.add('active');
  }
}

function openBookDetail(title, author, icon, bg, genre, isbn, avail, total, year, pub) {
  document.getElementById('bl-modal-book-title').textContent = title;
  document.getElementById('bl-modal-book-author').textContent = author;
  const iconEl = document.getElementById('bl-modal-book-icon');
  iconEl.textContent = icon; iconEl.style.background = bg;
  document.getElementById('modal-book-genre').textContent = genre;
  document.getElementById('modal-isbn').textContent = isbn;
  document.getElementById('modal-year').textContent = year;
  document.getElementById('modal-publisher').textContent = pub;
  document.getElementById('modal-qty').textContent = avail + ' / ' + total;
  const statusEl = document.getElementById('modal-book-status');
  const a = parseInt(avail), t = parseInt(total);
  if (a === 0) { statusEl.textContent = 'Quá hạn'; statusEl.className = 'bl-badge bl-badge-overdue'; }
  else if (a < t) { statusEl.textContent = 'Đang mượn'; statusEl.className = 'bl-badge bl-badge-borrowed'; }
  else { statusEl.textContent = 'Còn sách'; statusEl.className = 'bl-badge bl-badge-available'; }
  document.getElementById('book-modal').classList.add('bl-open');
}

function openAddBook() {
    document.getElementById('add-book-modal')
        .classList.add('bl-open');
    document.getElementById("edit-id").value = "";

    document.getElementById("modalTitle").innerText =
        "Thêm sách mới";

    document.querySelector("form").reset();
}

function openAddMember() {
    document.getElementById('add-member-modal').classList.add('bl-open');
}

function openUpdateMember() {
    document.getElementById('update-member-modal').classList.add('bl-open');
}
function closeModal(id) {
    document.getElementById(id).classList.remove('bl-open');
}

function showMemberProfile(name, initials, gradient, id, rank, phone, email, dob, total, overdue, expiry) {
  const av = document.getElementById('prof-avatar');
  av.textContent = initials;
  av.style.background = `linear-gradient(135deg,${gradient})`;
  document.getElementById('prof-name').textContent = name;
  document.getElementById('prof-id').textContent = '#' + id;
  document.getElementById('prof-total').textContent = total;
  document.getElementById('prof-overdue').textContent = overdue;
  document.getElementById('prof-info').innerHTML = `
    <div class="profile-info-row"><span class="profile-info-icon">📱</span><span class="profile-info-label">Điện thoại</span><span class="profile-info-val">${phone}</span></div>
    <div class="profile-info-row"><span class="profile-info-icon">📧</span><span class="profile-info-label">Email</span><span class="profile-info-val" style="font-size:12px;">${email}</span></div>
    <div class="profile-info-row"><span class="profile-info-icon">🎂</span><span class="profile-info-label">Ngày sinh</span><span class="profile-info-val">${dob}</span></div>
    <div class="profile-info-row"><span class="profile-info-icon">📅</span><span class="profile-info-label">Hết hạn</span><span class="profile-info-val">${expiry}</span></div>
  `;
}

    const toggle = document.querySelector(".menu-toggle");
    const menu = document.querySelector(".nav-content");

    toggle.addEventListener("click", () => {

        menu.classList.toggle("show");

        toggle.classList.toggle("active");

    });
</script>
