<script th:fragment="script">
    let qrScanner = null;
let currentInput = null;


    function showCircTab(tabId) {
      document.querySelectorAll('.circ-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.circ-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      const btnMap = {'borrow-tab':'tab-borrow-btn','renewed-tab':'tab-renewed-btn','return-tab':'tab-return-btn','overdue-tab':'tab-overdue-btn','history-tab':'tab-history-btn'};
      if (btnMap[tabId]) document.getElementById(btnMap[tabId]).classList.add('active');
    }

    window.addEventListener("DOMContentLoaded",() => {
        const params = new URLSearchParams(window.location.search);
        const open = params.get("open");
        if(open === "add"){
            openAddBook();
        }
    });

    function setView(v) {
      const grid = document.getElementById('books-grid-view');
      const list = document.getElementById('books-list-view');
      const list1 = document.getElementById('books-list');
      const editBook = document.getElementById('books-edit');

      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      if (v === 'grid') {
        list1.style.display = 'none'; editBook.style.display = 'block';
        grid.style.display = 'block'; list.style.display = 'none';
        document.querySelectorAll('.view-btn')[0].classList.add('active');
      } else {
        list1.style.display = 'block'; editBook.style.display = 'none';
        grid.style.display = 'none'; list.style.display = 'block';
        document.querySelectorAll('.view-btn')[1].classList.add('active');
      }
    }

    function openEditBookCopy() {
        document.getElementById('edit-bookcopy-modal').classList.add('bl-open');
    }

   function openAddMember() {
    document.getElementById('edit-id').value   = '';
    document.getElementById('modalTitle').innerText = 'Đăng ký hội viên mới';
    document.getElementById('up-btn').innerText     = '✓ Đăng ký & In thẻ';
    document.getElementById('add-member-modal').classList.add('bl-open');
}

    function openUpdateMember() {
        document.getElementById('update-member-modal').classList.add('bl-open');
    }
    function closeModal(id) {
        document.getElementById(id).classList.remove('bl-open');
    }


        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".nav-content");

        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.classList.toggle("active");

        });





function startScan(inputId) {
    document.getElementById("reader").style.display = "block";

    qrScanner = new Html5Qrcode("reader");

    qrScanner.start(
        { facingMode: "environment" },
        {
            fps: 30,
            qrbox: { width: 250, height: 250 }
        },
        (decodedText) => {
            console.log("SUCCESS:", decodedText);

            document.getElementById(inputId).value = decodedText;
            if (inputId === "card-id") {
                findReader();
            } else if (inputId === "book-id") {
                findBook();
            } else if (inputId === "return-keyword") {
                findReturnBook();
            }
            stopScan();
        }
    ).catch(err => {
    console.error(err);
    console.log("Lỗi khi khởi động scanner");
});
}

function stopScan() {
    if (qrScanner) {
        qrScanner.stop().then(() => {
            document.getElementById("reader").style.display = "none";
        });
    }
}
    function showToast(msg) {
     const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
     clearTimeout(t._to); t._to=setTimeout(()=>t.style.display='none',3000);
    }
</script>
