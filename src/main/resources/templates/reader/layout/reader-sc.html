        function doSearch(keyword) {

            if (!keyword || !keyword.trim()) return;
            keyword = keyword.trim();
            sessionStorage.setItem("keyword", keyword);
            if (!window.location.pathname.includes("/home/search")) {
                window.location.href = "/qltv/home/search";
                return;
            }
            searchBooks();
        }
        window.addEventListener("DOMContentLoaded", () => {
            const keyword = sessionStorage.getItem("keyword");
            if (keyword) {
                const input = document.getElementById("searchInput");
                if (input) input.value = keyword;
                searchBooks();
            }
        });
        function searchBooks() {

            const keyword = document.getElementById("searchInput")?.value || "";
            const availability = document.getElementById("fAvail").value;
            const format = document.getElementById("fFormat").value;
            const params = new URLSearchParams();

            if (keyword.trim()) {
                params.append("keyword", keyword.trim());
            }
            if (selectedGenre !== "Tất cả") {
                params.append("category", selectedGenre);
            }
            if (availability !== "all") {
                params.append("availability", availability);
            }
            if (format !== "all") {
                params.append("format", format);
            }
            fetch("/qltv/home/api/search?" + params.toString())
                .then(response => response.json())
                .then(data => renderBooks(data))
                .catch(error => console.error(error));
        }

        function renderBooks(books) {

                html += `
                    <div class="book-card">
                        <div class="book-cover" onclick="openDetail('${book.id}')">
                            <img src="${book.coverImage}" class="book-cover-art" alt="">
                        </div>

                            ${book.hasDigital ? '<span class="status-pill pill-confirmed">E-Book</span>': ''}

let pages = [];
let currentPage = 0;
let speaking = false;
let currentSpeech = null;

function updateAudioStatus(text) {
    const status = document.getElementById("audio-status");
    if (status) {
        status.textContent = text;
    }
}

function getVietnameseVoice() {
    const voices = speechSynthesis.getVoices();
    return voices.find(v => v.lang === "vi-VN")
        || voices.find(v => v.lang.startsWith("vi"))
        || voices[0];
}

async function startAudio() {

    const pdfUrl = document.getElementById("pdfUrl").value;
    if (!pdfUrl) {
        alert("Không tìm thấy PDF!");
        return;
    }
    stopAudio();
    updateAudioStatus("Đang tải nội dung...");
    try {
        const response = await fetch("/qltv/home/audio?pdfUrl=" +encodeURIComponent(pdfUrl));
        pages = await response.json();
        if (!pages || pages.length === 0) {
            updateAudioStatus("Không đọc được nội dung");
            alert("Không đọc được nội dung PDF!");
            return;
        }
        currentPage = 0;
        speaking = true;
        const totalPages = document.getElementById("total-pages");
        if (totalPages) {
            totalPages.textContent = "/ " + pages.length + " trang";
        }
        if (speechSynthesis.getVoices().length === 0) {
            await new Promise(resolve => {
                speechSynthesis.onvoiceschanged = () => resolve();
            });
        }
        readCurrentPage();
    } catch (e) {
        console.error(e);
        updateAudioStatus("Lỗi tải nội dung PDF");
    }
}

function readCurrentPage() {

    if (!speaking) return;
    if (currentPage < 0) {
        currentPage = 0;
    }
    if (currentPage >= pages.length) {
        updateAudioStatus("Đã đọc xong");
        speaking = false;
        return;
    }
    let text = pages[currentPage];
    if (!text || text.trim().length === 0) {
        currentPage++;
        setTimeout(readCurrentPage, 100);
        return;
    }
    text = text
        .replace(/\r/g, " ")
        .replace(/\n/g, " ")
        .trim();
    if (text.length > 300) {
        text = text.substring(0, 300);
    }
    updateAudioStatus(`Đang đọc trang ${currentPage + 1}/${pages.length}`);
    const speech = new SpeechSynthesisUtterance(text);
    currentSpeech = speech;
    speech.voice = getVietnameseVoice();
    speech.lang = "vi-VN";
    speech.volume = 1;
    speech.rate = 1;
    speech.pitch = 1;
    speech.onstart = () => {
        console.log("Đang đọc trang",currentPage + 1);
    };
    speech.onend = () => {
        if (!speaking) return;
        if (speech !== currentSpeech) return;
        currentPage++;
        if (currentPage < pages.length) {
            setTimeout(readCurrentPage,300);
        } else {
            updateAudioStatus("Đã đọc xong");
            speaking = false;
        }
    };
    speech.onerror = (e) => {
        console.error(e);
        if (speech !== currentSpeech) return;
        currentPage++;
        if (speaking) {
            setTimeout(readCurrentPage,300);
        }
    };
    speechSynthesis.speak(speech);
}

function pauseAudio() {

    if (!speechSynthesis.speaking) return;
    speechSynthesis.pause();
    updateAudioStatus(`Tạm dừng tại trang ${currentPage + 1}/${pages.length}`);
}

function resumeAudio() {

    if (!speechSynthesis.paused) return;
    speechSynthesis.resume();
    updateAudioStatus(`Đang đọc trang ${currentPage + 1}/${pages.length}`);
}

function stopAudio() {

    speaking = false;
    currentSpeech = null;
    speechSynthesis.cancel();
    updateAudioStatus("Đã dừng");
}

function nextPage() {

    if (!pages.length) return;
    speechSynthesis.cancel();
    currentSpeech = null;
    if (currentPage < pages.length - 1) {
        currentPage++;
    }
    speaking = true;
    setTimeout(() => {
        readCurrentPage();
    }, 100);
}

function prevPage() {
    if (!pages.length) return;
    speechSynthesis.cancel();
    currentSpeech = null;
    if (currentPage > 0) {
        currentPage--;
    }
    speaking = true;
    setTimeout(() => {
        readCurrentPage();
    }, 100);
}

function gotoPage() {
    if (!pages.length) {
        alert("Hãy bấm Đọc sách trước!");
        return;
    }
    const page =parseInt(document.getElementById("goto-page").value);
    if (isNaN(page)) {
        alert("Vui lòng nhập số trang!");
        return;
    }
    if (page < 1 ||page > pages.length) {
        alert(`Trang hợp lệ từ 1 đến ${pages.length}`);
        return;
    }
    speechSynthesis.cancel();
    currentSpeech = null;
    currentPage = page - 1;
    speaking = true;
    setTimeout(() => {
        readCurrentPage();
    }, 100);
}

const HISTORY_KEY = 'bibliolink_chat_history';
// ✅ Khôi phục history từ sessionStorage khi load trang
const chatHistory = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
let isWaiting = false;

function saveHistory() {
    sessionStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory));
}
function toggleChat() {
    const chatBox = document.getElementById('chatBox');
    const icon = document.getElementById('chatFabIcon');
    const isOpen = chatBox.classList.toggle('open');
    icon.className = isOpen ? 'ti ti-x' : 'ti ti-message-circle';
    if (isOpen) {
        restoreChatUI();  // ✅ render lại tin nhắn cũ
        document.getElementById('chatInput').focus();
    }
}
// ✅ Render lại toàn bộ lịch sử lên UI khi mở chat
function restoreChatUI() {
    const container = document.getElementById('chatMessages');
    // Xoá hết trừ tin nhắn chào mặc định
    const defaultMsg = container.querySelector('.message.bot');
    container.innerHTML = '';
    if (defaultMsg) container.appendChild(defaultMsg);
    chatHistory.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
        div.innerHTML = msg.content.replace(/\n/g, '<br>');
        container.appendChild(div);
        // Nếu lượt đó có books thì render lại card
        if (msg.booksJson) {
            renderBookCards(msg.booksJson, container);
        }
    });

    container.scrollTop = container.scrollHeight;
}

function appendMessage(role, text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function showTyping() {
    return appendMessage('bot',
        '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>'
    );
}

function renderBookCards(booksJson, container) {
    let data;
    try { data = JSON.parse(booksJson); } catch(e) { return; }
    if (!data.books || data.books.length === 0) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'chat-book-cards';
    data.books.forEach(book => {
        const card = document.createElement('div');
        card.className = 'chat-book-card';
        const img = document.createElement('img');
        img.src = book.cover || '/qltv/images/no-cover.png';
        img.alt = book.title;
        img.onerror = function() { this.src = '/qltv/images/no-cover.png'; };
        const info = document.createElement('div');
        info.className = 'book-info';
        info.innerHTML = `
            <div class="book-title" title="${book.title}">${book.title}</div>
            <div class="book-author">${book.author}</div>
            <div class="book-status ${book.statusKey}">${book.status}</div>
        `;
        const btn = document.createElement('button');
        btn.className = 'btn-choose';
        btn.textContent = 'Chọn';
        btn.onclick = () => handleChooseBook(book);
        card.append(img, info, btn);
        wrapper.appendChild(card);
    });

    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
}

function handleChooseBook(book) {
    const isOnSearchPage = window.location.pathname.includes('/home/search');
    if (isOnSearchPage) {
        const input = document.getElementById('searchInput');
        if (input) {
            input.value = book.title;
            searchBooks();
        }
    } else {
        // ✅ Lưu history trước khi redirect
        saveHistory();
        window.location.href = `/qltv/home/search?keyword=${encodeURIComponent(book.title)}`;
    }
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isWaiting) return;
    input.value = '';
    isWaiting = true;
    appendMessage('user', text);
    chatHistory.push({ role: 'user', content: text });
    saveHistory();
    const typingEl = showTyping();
    try {
        const res = await fetch('/qltv/home/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: text,
                // ✅ Lọc bỏ tin nhắn lỗi khỏi history trước khi gửi
                history: chatHistory.slice(0, -1).filter(msg =>
                    msg.content &&
                    !msg.content.startsWith('Có lỗi xảy ra:') &&
                    !msg.content.startsWith('Xin lỗi, tôi đang gặp sự cố') &&
                    !msg.content.startsWith('Kết nối thất bại')
                )
            })
        });
        const data = await res.json();
        typingEl.remove();
        const reply = data.reply || 'Xin lỗi, có lỗi xảy ra.';
        const container = document.getElementById('chatMessages');

        if (data.searchCalled) {
            container.querySelectorAll('.chat-book-cards').forEach(el => el.remove());
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot';
        msgDiv.innerHTML = reply.replace(/\n/g, '<br>');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;

        if (data.booksJson) {
            renderBookCards(data.booksJson, container);
        }

        chatHistory.push({
            role: 'assistant',
            content: reply,
            booksJson: data.booksJson || null,
            keyword: data.keyword || null
        });
        saveHistory();
        if (chatHistory.length > 20) {
            chatHistory.splice(0, 2);
            saveHistory();
        }
    } catch(e) {
        typingEl.remove();
        // ✅ Chỉ show thông báo thân thiện, không show lỗi kỹ thuật
        appendMessage('bot', 'Xin lỗi, kết nối bị gián đoạn. Bạn vui lòng thử lại nhé!');
    } finally {
        isWaiting = false;
    }
}
