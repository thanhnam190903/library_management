<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="reader/layout/reader-head :: reader-head">
</head>
<body>

<!-- ══════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════ -->
<div th:replace="reader/layout/reader-sidebar :: reader-sidebar"></div>

<!-- ══════════════════════════════════════════
     APP BODY
══════════════════════════════════════════ -->
<div class="app-body">
    <!-- TOPBAR -->
    <div th:replace="reader/layout/reader-header :: reader-header"></div>

    <div class="content-wrap">
        <!-- MAIN SCROLL -->
        <div class="main-scroll" id="mainScroll">

            <!-- ════ PAGE: SEARCH ════ -->
            <div id="page-search" style="display:block">
                <div class="page-hdr">
                    <div class="page-title">Tìm kiếm sách</div>
                    <div class="page-sub">Khám phá kho sách của thư viện</div>
                </div>
                <div class="search-bar-big">
                    <input type="text" id="searchInput" placeholder="Nhập tên sách, tác giả, thể loại..."
                           onkeydown="if(event.key==='Enter') searchBooks()"/>
                    <button onclick="searchBooks()"><i class="ti ti-search" style="font-size:15px"></i> Tìm kiếm
                    </button>
                </div>
                <div class="filter-row" id="genreChips">
                    <span class="chip active" onclick="setGenre('Tất cả',this)">Tất cả</span>
                    <span class="chip" th:each="c : ${categories}" th:text="${c.categoryName}"
                          th:attr="onclick=|setGenre('${c.categoryName}',this)|"></span>
                </div>
                <div class="filter-row">
                    <select class="filter-select" id="fAvail" onchange="searchBooks()">
                        <option value="all">Tình trạng: Tất cả</option>
                        <option value="avail">Còn sách</option>
                        <option value="unavail">Hết sách</option>
                    </select>
                    <select class="filter-select" id="fFormat" onchange="searchBooks()">
                        <option value="all">Định dạng: Tất cả</option>
                        <option value="digital">Có E-Book</option>
                        <option value="physical">Sách in</option>
                    </select>
                    <button class="chip" onclick="resetSearch()" style="border-color:var(--red);color:var(--red)"><i
                            class="ti ti-refresh" style="font-size:12px"></i> Đặt lại
                    </button>
                </div>
                <div class="books-row" id="searchGrid"
                     style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">

                </div>
            </div>

        </div><!-- /main-scroll -->

    </div><!-- /content-wrap -->
</div><!-- /app-body -->

<!-- ══ NOTIFICATION PANEL ══ -->

<div class="modal-overlay" id="detailModal">
    <div class="modal-box" style="width:520px">
        <div style="display:flex;gap:16px;margin-bottom:16px">
            <img id="dArt" style="width:100px;height:125px;border-radius:8px;flex-shrink:0"></img>
            <div style="flex:1">
                <div id="dTitle"
                     style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink);margin-bottom:4px"></div>
                <div id="dAuthor" style="font-size:13px;color:var(--muted);margin-bottom:8px"></div>
                <div id="dBadges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
            </div>
        </div>
        <div class="detail-meta-grid" id="dMeta"></div>
        <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">
                Mô tả
            </div>
            <div id="dDesc" style="font-size:13.5px;line-height:1.75;color:var(--ink2)"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('detailModal')">Đóng</button>
            <input type="hidden" id="pdfUrl">
            <input type="hidden" id="digital-id">
            <button class="btn-renew" id="dReadBtn" style="display:none;" onclick="readBook()">Đọc
                online
            </button>
            <button class="btn-confirm" sec:authorize="!isAuthenticated()" onclick="checkLoginAndGo()" >
                <i class="ti ti-send" style="font-size:13px"></i>Đặt mượn
            </button>
            <button class="btn-confirm" id="dBorrowBtn" sec:authorize="isAuthenticated()" onclick="borrowFromModal()">
                <i class="ti ti-send" style="font-size:13px"></i>Đặt mượn
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="borrowModal">
    <div class="modal-box">
        <div class="modal-title">Đặt mượn sách</div>
        <div class="modal-sub">Gửi yêu cầu — thủ thư xác nhận và giữ sách 48 giờ</div>
        <div class="modal-cover-row">
            <div class="modal-book-art" id="mBorrowArt"></div>
            <div style="flex:1">
                <div class="modal-book-title" id="mBorrowTitle">—</div>
                <div class="modal-book-author" id="mBorrowAuthor">—</div>
                <div id="mBorrowAvail" style="font-size:12.5px;margin-bottom:4px"></div>
                <div id="mBorrowShelf" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px"><i class="ti ti-map-pin" style="color:var(--blue);font-size:12px"></i><span id="mBorrowShelfText">—</span></div>
            </div>
        </div>
        <form th:action="@{/home/borrow-request}" method="post">
            <div class="modal-info-box"><i class="ti ti-info-circle" style="font-size:15px"></i>
                <span>Sau khi gửi yêu cầu, thủ thư sẽ xác nhận và giữ sách trong <strong>48 giờ</strong>. Bạn đến thư viện lấy trực tiếp.</span></div>
            <div class="form-field"><label class="form-label">Hình thức nhận</label>
                <select class="form-select" disabled>
                    <option value="pickup">Đến thư viện lấy trực tiếp</option>
                </select>
            </div>
            <input id="borrowBookId" type="hidden" name="bookTitle">
            <div class="form-field"><label class="form-label">Thời hạn mượn</label>
                <select class="form-select" name="requestDays">
                    <option value="7" selected>7 ngày</option>
                    <option value="14">14 ngày</option>
                    <option value="21">21 ngày</option>
                    <option value="30">30 ngày</option>
                </select>
            </div>
            <div class="form-field">
                <label class="form-label">Ghi chú cho thủ thư (tuỳ chọn)</label>
                <input class="form-input" name="note"  placeholder="Ví dụ: tôi sẽ đến vào buổi chiều..."/>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" type="button" onclick="closeModal('borrowModal')">Huỷ</button>
                <button class="btn-confirm">
                    <i class="ti ti-send" style="font-size:13px"></i>Gửi yêu cầu</button>
            </div>
        </form>

    </div>
</div>

<div class="modal-overlay" id="pdfModal">
    <div class="modal-box" style="width:950px;height: 800px;position: sticky;">
        <div class="modal-actions" style="justify-content: center;gap: 10px;">
            <button class="btn-cancel" onclick="startAudio()">🔊 Đọc sách</button>
            <button class="btn-cancel" onclick="prevPage()">⏮ Trang trước</button>
            <button class="btn-cancel" onclick="pauseAudio()">⏸ Tạm dừng</button>
            <button class="btn-cancel" onclick="resumeAudio()">▶ Tiếp tục</button>
            <button class="btn-cancel" onclick="nextPage()">⏭ Trang sau</button>
            <button class="btn-cancel" onclick="stopAudio()">⏹ Dừng</button>
            <button class="btn-cancel" onclick="closeBook()">Đóng</button>
        </div>
        <div style="margin-top:12px;margin-left: 30px;">
            <input type="number" id="goto-page" min="1" placeholder="Số trang"
                    style="width:100px;padding:8px;border:1px solid #ccc;border-radius:6px;">
            <button class="btn-cancel" style="background-color: green;color: white;" onclick="gotoPage()">📖 Đi tới</button>
            <div id="audio-status" style="text-align:center;margin-top: -30px;font-weight:600;color:#333;font-size:15px;">
                Chưa đọc
            </div>
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px;width: 950px;height: 800px;">
            <iframe id="pdfFrame" style="width:950px;height: 800px;" src="">
            </iframe>
            <div id="pdf-toolbar-mask" >
            </div>
        </div>

    </div>
</div>
<div class="chat-widget" th:replace="reader/layout/reader-chat :: reader-chat"></div>
<!-- ══ READER OVERLAY ══ -->

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="reader/layout/reader-sc :: reader-script"></div>
<script>

    window.addEventListener('DOMContentLoaded', () => {

    const params = new URLSearchParams(window.location.search);
    const kw = params.get('keyword');
    if (kw) {
        const input = document.getElementById('searchInput');
        if (input) {
            input.value = kw;
             // gọi function search có sẵn
        }
    }
    searchBooks();
});
</script>
</body>
</html>
